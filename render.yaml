services:
  - type: web
    name: amount-distribution
    env: static
    buildCommand: npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      # SPA fallback: serve index.html for every path so React Router handles routing client-side.
      # Without this, Render returns 404 for direct navigation to /login, /dashboard, etc.
      - type: rewrite
        source: /*
        destination: /index.html
